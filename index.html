<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<!-- iPhone 鐵則：viewport-fit=cover 必須有，安全區才會生效 -->
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<!-- PWA / iPhone 加入主畫面 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<!-- theme-color 由 app.js 依 ALBUM_CONFIG.theme.themeColor 覆寫 -->
<meta name="theme-color" content="#0d0a12">
<!-- 標題與 icon 由 app.js 從 config 填入 -->
<title>THE SKY TEST 3</title>
<link id="apple-touch-icon" rel="apple-touch-icon" href="https://ceonowens-ui.github.io/the-sky-ost/assets/images/cover.png">

<!-- 字體（想換字體就改這行 + styles.css 的 --font-* 變數） -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400..900;1,400..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">

<style>
/* =====================================================================
 * ALBUM APP TEMPLATE — styles.css
 * =====================================================================
 * 不含專輯專屬資料。所有顏色透過 CSS 變數（由 app.js 從
 * ALBUM_CONFIG.theme 注入），換專輯不需要改這個檔案。
 *
 * iPhone 鐵則（來自實測，違反任何一條 iPhone Safari 就會壞）：
 *   1. 每個 backdrop-filter 都「同時」有 -webkit-backdrop-filter
 *   2. 安全區：env(safe-area-inset-top / bottom)
 *   3. 高度：100vh 後面補 100dvh
 *   4. viewport meta 必須有 viewport-fit=cover（在 index.html）
 * ===================================================================== */

:root {
  /* 預設值 = Secret Lover 主題；app.js 會用 ALBUM_CONFIG.theme 覆寫 */
  --bg: #0d0a12;
  --bg-top: #1c1426;
  --surface: rgba(22, 16, 28, .55);
  --primary: #f29bc2;
  --secondary: #c9b0ec;
  --accent: #afc7f6;
  --text: #ffffff;
  --muted: rgba(255, 255, 255, .62);
  /* app.js 會把 primary 換算成 r,g,b 填進來，供 rgba() 使用 */
  --primary-rgb: 242, 155, 194;
  --grad: linear-gradient(135deg, var(--primary), var(--secondary) 52%, var(--accent));
  --font-display: 'Playfair Display', serif;   /* 英文斜體大標 */
  --font-label: 'Bodoni Moda', serif;          /* 小型全大寫 label / 數字 */
  --font-serif-tc: 'Noto Serif TC', serif;     /* 中文標題 */
  --font-sans-tc: 'Noto Sans TC', sans-serif;  /* 中文內文 */
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100vh;
  height: 100dvh; /* iPhone：dvh 蓋掉 vh */
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-sans-tc);
  -webkit-font-smoothing: antialiased;
}

/* ---- 舞台：手機滿版；桌機置中成手機比例 --------------------------- */
#stage {
  position: relative;
  width: 100%;
  height: 100vh;
  height: 100dvh;
  margin: 0 auto;
  overflow: hidden;
  background: var(--bg);
}
/* 手機（<520px）：不要用 vh/dvh 算高度，直接 fixed 釘滿整個視窗。
   iOS Safari 網址列收合/展開時 dvh 會跟實際可視區對不上，造成底部黑 bar、
   浮動 nav 浮到半空中。fixed + inset:0 永遠貼齊真正的畫面四邊
   （參照《手機底部黑bar-解法小抄》：手機版鋪滿、不留假外框）。 */
@media (max-width: 519.98px) {
  /* fixed + inset:0 同時釘住上下四邊，不再靠 dvh/--vvh 算高度，底部不露黑框 */
  #stage { position: fixed; inset: 0; height: auto; }
}
@media (min-width: 520px) {
  body { display: flex; align-items: center; justify-content: center;
         background: radial-gradient(130% 100% at 50% -5%, var(--bg-top), #060409 60%); }
  #stage { width: 416px; height: min(870px, 96vh); border-radius: 44px;
           box-shadow: 0 44px 90px rgba(0,0,0,.6), 0 0 0 12px #17131d, 0 0 0 13px rgba(255,255,255,.07); }
}

/* ---- 分頁 screen ---------------------------------------------------- */
.screen { position: absolute; inset: 0; display: none; overflow-y: auto;
          -webkit-overflow-scrolling: touch; }
.screen.active { display: block; }
.screen-sub { background: radial-gradient(120% 60% at 50% 0%, var(--bg-top), var(--bg) 70%);
              padding: 62px 0 calc(96px + env(safe-area-inset-bottom)); }

/* =====================================================================
 * PLAYER
 * =================================================================== */
#screen-player { background: var(--bg); overflow: hidden; }
/* 播放頁：單螢幕不滾動。封面擐滿上方，NP 卡在下，底部預留導覽島高度 */
.player-fold { display: flex; flex-direction: column; height: 100%;
               padding-bottom: calc(78px + env(safe-area-inset-bottom)); }

/* 封面：圓角長方形 + 上方留白（DESIGN LOCK：不要改成貼頂滿版） */
.cover-card {
  position: relative; flex: 1 1 auto; overflow: hidden;
  min-height: 200px;
  margin: calc(14px + env(safe-area-inset-top)) 12px 0;
  border-radius: 28px;
  box-shadow: 0 22px 50px rgba(0,0,0,.58), 0 5px 16px rgba(0,0,0,.42), 0 0 0 1px rgba(255,255,255,.06);
}
.cover-card img, .cover-card video {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: cover; object-position: center 42%;
  transform-origin: center 45%;
  animation: breathe 7s ease-in-out infinite;
  animation-play-state: paused; /* 播放時 app.js 切成 running（呼吸動畫） */
}
.cover-card.playing img, .cover-card.playing video { animation-play-state: running; }
/* 有設定 coverVideo 時，影片顯示、圖片當作影片載入前的 poster 用途隱藏 */
.cover-card video { display: none; }
.cover-card.has-video video { display: block; z-index: 1; }
/* 保留封面圖在影片下方當 fallback：影片未載入/播放前不會黑屏 */
.cover-card.has-video img { display: block; z-index: 0; }
.cover-shade {
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(0,0,0,.6) 0%, rgba(0,0,0,.33) 7%,
              transparent 15%, transparent 78%, rgba(0,0,0,.3) 91%, rgba(0,0,0,.51) 100%);
}
.cover-titles { position: absolute; top: 0; left: 0; right: 0; padding: 14px 24px 0;
                text-align: center; z-index: 2; }
.cover-eyebrow { font-family: var(--font-label); font-weight: 500; font-size: 9px;
                 letter-spacing: 4.5px; color: rgba(255,255,255,.85);
                 text-transform: uppercase; text-shadow: 0 1px 8px rgba(0,0,0,.5); }
.cover-title-en { font-family: var(--font-display); font-style: italic; font-weight: 600;
                  font-size: 28px; letter-spacing: .5px; line-height: 1; margin-top: 5px;
                  text-shadow: 0 3px 20px rgba(0,0,0,.6); }

/* Now Playing：毛玻璃卡片，往上疊在封面（DESIGN LOCK） */
.np-card {
  position: relative; z-index: 3;
  margin: -52px 18px 0; /* 底部不留死空隙，曲目清單直接貼上來 */
  padding: 12px 18px 4px;
  background: var(--surface);
  backdrop-filter: blur(22px);
  -webkit-backdrop-filter: blur(22px); /* iPhone 必要 */
  border: 1px solid rgba(255,255,255,.14);
  border-radius: 24px;
  box-shadow: 0 24px 60px rgba(0,0,0,.5);
}
.np-head { display: flex; justify-content: space-between; align-items: flex-start; }
.np-label { font-family: var(--font-label); font-size: 9px; letter-spacing: 4px;
            color: var(--primary); text-transform: uppercase; }
.np-title { font-family: var(--font-serif-tc); font-size: 22px; font-weight: 600;
            margin-top: 3px; letter-spacing: 1.5px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.np-sub { font-family: var(--font-display); font-style: italic; font-size: 13px;
          color: rgba(255,255,255,.7); margin-top: 4px;
          white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.np-actions { display: flex; gap: 8px; margin-left: 12px; flex: none; }
.icon-round {
  position: relative; width: 44px; height: 44px; border-radius: 50%;
  background: rgba(var(--primary-rgb), .12); border: 1px solid rgba(var(--primary-rgb), .45);
  display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--primary);
}
.icon-round:active { transform: scale(.92); }
.icon-round.liked svg { animation: bounce .5s ease; }
/* 歌詞：文字 pill（取代原本的圖示） */
.btn-lyrics-text { height: 44px; padding: 0 16px; border-radius: 22px;
                   background: rgba(var(--primary-rgb), .12); border: 1px solid rgba(var(--primary-rgb), .45);
                   color: var(--primary); cursor: pointer; flex: none;
                   font-family: var(--font-label); font-size: 12px; font-weight: 600;
                   letter-spacing: 2px; text-transform: uppercase;
                   display: flex; align-items: center; justify-content: center; }
.btn-lyrics-text:active { transform: scale(.94); }

/* 進度條 */
.prog { position: relative; height: 4px; border-radius: 4px;
        background: rgba(255,255,255,.18); cursor: pointer; margin-top: 12px;
        touch-action: none; }
.prog-fill { position: absolute; left: 0; top: 0; height: 100%; border-radius: 4px;
             width: 0%; background: var(--grad); }
.prog-glow { position: absolute; top: 50%; left: 13px; transform: translate(-50%, -50%);
             width: 32px; height: 32px; border-radius: 50%;
             background: rgba(var(--primary-rgb), .9); filter: blur(7px); opacity: .34;
             pointer-events: none; }
.prog-glow.pulsing { animation: dotPulse 2.4s ease-in-out infinite; }
.prog-dot { position: absolute; top: 50%; left: 13px; transform: translate(-50%, -50%);
            width: 26px; height: 26px; border-radius: 50%; z-index: 1;
            background: var(--grad); border: 2px solid #fff;
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-serif-tc); font-size: 12px; font-weight: 600; color: #fff;
            box-shadow: 0 2px 10px rgba(0,0,0,.4), 0 0 12px rgba(var(--primary-rgb), .9); }
.prog-dot:empty { width: 14px; height: 14px; } /* 沒設定角色標籤時退回小圓點 */
.np-times { display: flex; justify-content: space-between; margin-top: 9px;
            font-family: var(--font-label); font-size: 11px; letter-spacing: 1px;
            color: rgba(255,255,255,.55); }

/* 控制鍵 */
.np-controls { display: flex; align-items: center; justify-content: center;
               gap: 28px; margin-top: 2px; }
.btn-ghost { background: none; border: none; cursor: pointer; padding: 6px;
             color: rgba(255,255,255,.85); }
.btn-ghost:active { transform: scale(.9); }
.btn-play {
  width: 46px; height: 46px; border-radius: 50%; border: none; cursor: pointer;
  background: rgba(255,255,255,.85);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 10px 30px rgba(120,90,160,.45),
              inset 0 1px 10px rgba(var(--primary-rgb), .55),
              inset 0 0 0 1px rgba(255,255,255,.55);
}
.btn-play:active { transform: scale(.94); }
.btn-play svg { fill: #2c1f3a; }

/* Next Scene（打開 Bottom Sheet） */
.np-next { display: flex; align-items: center; justify-content: space-between;
           border-top: 1px solid rgba(255,255,255,.10); margin-top: 6px;
           padding: 6px 2px 2px; cursor: pointer; }
.np-next span { font-family: var(--font-label); font-size: 10px; letter-spacing: 3px;
                color: rgba(255,255,255,.6); text-transform: uppercase; }

/* 曲目列表（fold 之下） */
.tracklist-block { background: var(--bg);
                   /* 曲目清單直接接在 NP 卡下方、貼到畫面底；
                      底部 padding 預留浮動 nav + home indicator 的高度，
                      捲到最底時最後一首不會被 nav 蓋住。 */
                   margin-top: 14px;
                   padding: 0 16px calc(96px + env(safe-area-inset-bottom)); }
.tracklist-caption { font-family: var(--font-label); font-size: 10px; letter-spacing: 3px;
                     color: rgba(255,255,255,.5); text-transform: uppercase; padding: 0 12px 8px; }
.track-row { display: flex; align-items: center; gap: 13px; padding: 10px 12px;
             border-radius: 14px; cursor: pointer; }
.track-row:active { background: rgba(255,255,255,.05); }
.track-row.current { background: rgba(var(--primary-rgb), .10); }
.track-row.revealing { animation: reveal .5s ease both; }
.track-num { font-family: var(--font-label); font-size: 13px; width: 24px;
             text-align: center; color: #9a93a8; flex: none; }
.track-name { flex: 1; min-width: 0; font-family: var(--font-serif-tc); font-size: 16px;
              color: rgba(255,255,255,.82);
              white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.track-row.current .track-num { color: var(--primary); }
.track-row.current .track-name { color: #fff; }
.track-row.locked .track-num { color: #5f5870; }
.track-row.locked .track-name { color: #7a7388; font-style: italic; letter-spacing: 1px; }
.track-dl { display: flex; align-items: center; justify-content: center;
            width: 34px; height: 34px; flex: none; border: none; border-radius: 10px;
            background: rgba(var(--primary-rgb), .12); cursor: pointer; color: var(--primary); }

/* =====================================================================
 * BOTTOM SHEET（曲目表：可滑動、iOS 拖曳把手關閉）
 * =================================================================== */
#sheet-backdrop { position: absolute; inset: 0; z-index: 60;
                  background: rgba(8,6,12,.55); animation: fadeIn .25s ease; }
#sheet {
  position: absolute; left: 0; right: 0; bottom: 0; z-index: 61; height: 84%;
  background: linear-gradient(180deg, var(--bg-top), var(--bg));
  border-radius: 26px 26px 0 0;
  border-top: 1px solid rgba(255,255,255,.12);
  display: flex; flex-direction: column;
  animation: slideUp .32s cubic-bezier(.22,.9,.3,1);
  touch-action: none; /* 拖曳關閉時避免頁面捲動打架 */
  will-change: transform;
}
#sheet.dragging { animation: none; transition: none; }
#sheet.snapping { transition: transform .28s cubic-bezier(.22,.9,.3,1); }
.sheet-grabber { width: 44px; height: 5px; border-radius: 3px;
                 background: rgba(255,255,255,.28); margin: 10px auto 0; flex: none; }
.sheet-head { padding: 8px 24px; display: flex; align-items: center;
              justify-content: space-between; flex: none; }
.sheet-eyebrow { font-family: var(--font-label); font-size: 10px; letter-spacing: 4px;
                 color: var(--primary); text-transform: uppercase; }
.sheet-title { font-family: var(--font-serif-tc); font-size: 15px; margin-top: 4px;
               letter-spacing: 2px; }
.sheet-close { width: 34px; height: 34px; border-radius: 50%;
               background: rgba(255,255,255,.08); border: none; color: #fff;
               cursor: pointer; display: flex; align-items: center; justify-content: center; }
.sheet-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
              padding: 6px 14px calc(30px + env(safe-area-inset-bottom));
              touch-action: pan-y; }
.sheet-list .track-row { padding: 13px 14px; }

/* =====================================================================
 * LYRICS OVERLAY
 * =================================================================== */
#lyrics-overlay { position: absolute; inset: 0; z-index: 65;
                  background: rgba(10,7,14,.92);
                  backdrop-filter: blur(18px);
                  -webkit-backdrop-filter: blur(18px);
                  display: flex; flex-direction: column; animation: fadeIn .25s ease; }
.lyrics-head { flex: none; padding: calc(20px + env(safe-area-inset-top)) 24px 10px;
               display: flex; align-items: flex-start; justify-content: space-between; }
.lyrics-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
               padding: 8px 30px calc(60px + env(safe-area-inset-bottom));
               font-family: var(--font-serif-tc); font-size: 16px; line-height: 2.2;
               color: rgba(255,255,255,.86); white-space: pre-wrap; text-align: center;
               letter-spacing: 1px; }
.lyrics-empty { color: var(--muted); font-size: 13px; padding-top: 60px; text-align: center; }

/* =====================================================================
 * PURCHASE（付費解鎖頁）
 * =================================================================== */
.page-titles { text-align: center; padding: 0 28px; }
.page-title-en { font-family: var(--font-display); font-style: italic; font-size: 27px; }
.page-title-tc { font-family: var(--font-serif-tc); font-size: 16px;
                 color: rgba(255,255,255,.85); letter-spacing: 2px; margin-top: 8px; }
.page-note { font-size: 12.5px; color: rgba(255,255,255,.5); margin-top: 12px; line-height: 1.75; }

.plans { padding: 28px 22px 0; display: flex; flex-direction: column; gap: 18px; }
.plan { position: relative; border-radius: 22px; padding: 24px 22px; cursor: pointer;
        background: rgba(255,255,255,.04); border: 1.5px solid rgba(255,255,255,.12); }
.plan.deluxe { background: rgba(var(--primary-rgb), .07);
               border-color: rgba(var(--primary-rgb), .45); }
.plan.selected { border-color: var(--primary); }
.plan-badge { position: absolute; top: -11px; right: 18px; background: var(--grad);
              color: #fff; font-family: var(--font-label); font-size: 10px;
              padding: 5px 12px; border-radius: 20px; letter-spacing: 2px; }
.plan-name { font-family: var(--font-serif-tc); font-size: 15px; letter-spacing: 1px; }
.plan-price { font-family: var(--font-label); font-size: 30px; font-weight: 700; margin-top: 4px; }
.plan-features { margin-top: 16px; display: flex; flex-direction: column; gap: 10px; }
.plan-feature { display: flex; gap: 9px; font-size: 12.5px; color: rgba(255,255,255,.7);
                align-items: center; }
.plan-feature svg { flex: none; stroke: var(--primary); }

.cta-block { padding: 18px 24px 0; }
.btn-primary { display: block; width: 100%; text-align: center; padding: 15px;
               border-radius: 16px; background: var(--grad); color: #fff; border: none;
               font-family: var(--font-serif-tc); font-size: 14px; letter-spacing: 2px;
               cursor: pointer; font-weight: 600; }
.btn-primary:active { transform: scale(.98); }
.btn-outline { display: block; width: 100%; text-align: center; padding: 14px;
               margin-top: 11px; border-radius: 16px; background: none; color: var(--primary);
               border: 1.5px solid rgba(var(--primary-rgb), .5);
               font-family: var(--font-serif-tc); font-size: 13px; letter-spacing: 2px;
               cursor: pointer; }

/* =====================================================================
 * UNLOCK（兌換頁）
 * =================================================================== */
.unlock-lock-badge { width: 62px; height: 62px; border-radius: 50%;
                     background: rgba(var(--primary-rgb), .14);
                     border: 1px solid rgba(var(--primary-rgb), .4);
                     display: flex; align-items: center; justify-content: center;
                     margin: 0 auto 16px; color: var(--primary); }
.form-block { padding: 22px 28px 0; }
.form-label { font-family: var(--font-label); font-size: 11px; font-weight: 600;
              color: rgba(255,255,255,.5); letter-spacing: 3px; }
.form-input { width: 100%; margin: 9px 0 18px; padding: 15px; border-radius: 16px;
              border: 1.5px solid rgba(255,255,255,.14); background: rgba(255,255,255,.05);
              font-size: 14px; color: #fff; outline: none; font-family: var(--font-serif-tc); }
.form-input:focus { border-color: rgba(var(--primary-rgb), .6); }
.form-hint { text-align: center; font-size: 12px; color: rgba(255,255,255,.5); margin-top: 22px;
             cursor: pointer; }
.form-hint b { color: var(--primary); font-weight: 500; }
.redeem-divider { display: flex; align-items: center; gap: 14px; margin: 30px 24px 4px; }
.redeem-divider::before, .redeem-divider::after { content: ""; flex: 1; height: 1px;
                    background: rgba(255,255,255,.14); }
.redeem-divider span { font-family: var(--font-serif-tc); font-size: 12px; letter-spacing: 2px;
                       color: rgba(255,255,255,.5); white-space: nowrap; }

.unlocked-card { border-radius: 22px; background: rgba(var(--primary-rgb), .08);
                 border: 1px solid rgba(var(--primary-rgb), .3);
                 padding: 28px 22px; text-align: center; margin: 26px 24px 0; }
.unlocked-check { width: 58px; height: 58px; border-radius: 50%; background: var(--grad);
                  display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
.unlocked-eyebrow { font-family: var(--font-label); font-size: 11px; color: var(--primary);
                    letter-spacing: 3px; }
.unlocked-title { font-family: var(--font-serif-tc); font-size: 17px; margin-top: 8px;
                  letter-spacing: 1px; }
.unlocked-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: center;
                    flex-wrap: wrap; }
.btn-chip { display: flex; align-items: center; gap: 7px; padding: 13px 22px;
            border-radius: 14px; background: rgba(255,255,255,.08); color: #fff;
            border: 1px solid rgba(255,255,255,.16); font-family: var(--font-serif-tc);
            font-size: 13px; letter-spacing: 1.5px; cursor: pointer; text-decoration: none; }
.btn-chip.grad { background: var(--grad); border: none; }
.unlocked-note { font-size: 11px; color: rgba(255,255,255,.38); margin-top: 13px;
                 letter-spacing: .5px; }
.unlocked-reset { font-size: 11px; color: rgba(255,255,255,.28); margin-top: 16px;
                  letter-spacing: .5px; cursor: pointer; text-decoration: underline;
                  text-underline-offset: 3px; }

/* =====================================================================
 * MOOD WALL（粉絲心情牆）
 * =================================================================== */
.mood-count { text-align: center; font-size: 12px; color: rgba(255,255,255,.5);
              letter-spacing: .5px; padding: 18px 28px 4px; }
.mood-count b { color: var(--primary); font-weight: 600; font-family: var(--font-label); }
.mood-form { margin: 10px 20px 0; padding: 18px 17px; border-radius: 22px;
             background: rgba(255,255,255,.05);
             backdrop-filter: blur(10px);
             -webkit-backdrop-filter: blur(10px);
             border: 1px solid rgba(var(--primary-rgb), .22);
             box-shadow: 0 12px 30px rgba(0,0,0,.3); }
.mood-form .form-input { margin: 0; padding: 12px 14px; border-radius: 14px; font-size: 13.5px; }
.mood-tags { display: flex; flex-wrap: wrap; gap: 8px; margin: 14px 0 4px; }
.mood-tag { padding: 7px 14px; border-radius: 20px; font-size: 12px;
            font-family: var(--font-serif-tc); cursor: pointer;
            background: rgba(255,255,255,.05); color: rgba(255,255,255,.6);
            border: 1px solid rgba(255,255,255,.16); }
.mood-tag.selected { background: var(--grad); color: #fff; border-color: transparent;
                     box-shadow: 0 5px 14px rgba(var(--primary-rgb), .3); }
.mood-textarea { width: 100%; min-height: 74px; resize: none; margin-top: 12px;
                 padding: 13px 15px; border-radius: 14px;
                 border: 1.5px solid rgba(255,255,255,.14); background: rgba(255,255,255,.05);
                 font-size: 13.5px; line-height: 1.6; color: #fff; outline: none;
                 font-family: var(--font-serif-tc); }
.mood-chars { text-align: right; font-family: var(--font-label); font-size: 11px;
              color: rgba(255,255,255,.4); margin-top: 6px; }
.mood-err { color: var(--primary); font-size: 11.5px; text-align: center; margin-top: 4px; }
.mood-submit { margin-top: 10px; border-radius: 22px; }
.mood-notes { padding: 20px 20px 0; }
.mood-note { background: rgba(255,255,255,.04);
             backdrop-filter: blur(8px);
             -webkit-backdrop-filter: blur(8px);
             border: 1px solid rgba(255,255,255,.08); border-radius: 18px;
             padding: 15px 17px; margin-bottom: 12px; }
.mood-note.new { animation: reveal .5s ease both; }
.mood-note-head { display: flex; align-items: center; gap: 9px; margin-bottom: 9px; }
.mood-note-name { font-family: var(--font-serif-tc); font-size: 13px; font-weight: 600;
                  color: #e6def0; }
.mood-note-tag { font-size: 10.5px; color: var(--primary);
                 background: rgba(var(--primary-rgb), .14); padding: 3px 10px;
                 border-radius: 14px; letter-spacing: .5px; white-space: nowrap; }
.mood-note-text { font-family: var(--font-serif-tc); font-size: 13.5px; line-height: 1.7;
                  color: rgba(255,255,255,.85); }
.mood-note-time { font-family: var(--font-label); font-size: 10.5px;
                  color: rgba(255,255,255,.35); margin-top: 9px; letter-spacing: .5px; }

/* =====================================================================
 * GALLERY（寫真牆：滿版橫向滑動，一次一張）
 * =================================================================== */
#screen-gallery { background: #000; overflow: hidden; padding: 0; }
.gallery-scroll {
  position: absolute; inset: 0; margin: 0; padding: 0; gap: 0;
  display: flex; overflow-x: auto; scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch; scrollbar-width: none;
}
.gallery-scroll::-webkit-scrollbar { display: none; }
.gallery-slide {
  position: relative; flex: 0 0 100%; width: 100%; height: 100%;
  scroll-snap-align: center; overflow: hidden;
}
.gallery-slide img {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: cover; object-position: center 20%;
}
.gallery-slide .gallery-shade {
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(0,0,0,.35) 0%, transparent 22%,
              transparent 62%, rgba(0,0,0,.6) 100%);
}
.gallery-slide .gallery-caption {
  position: absolute; left: 22px; right: 22px; bottom: calc(96px + env(safe-area-inset-bottom));
  font-family: var(--font-serif-tc); font-size: 13px; letter-spacing: .5px;
  color: rgba(255,255,255,.95); text-shadow: 0 2px 12px rgba(0,0,0,.6); z-index: 2; }
/* 頂部標題疊在照片上 */
.gallery-top { position: absolute; top: 0; left: 0; right: 0; z-index: 3;
               padding: calc(20px + env(safe-area-inset-top)) 24px 44px; text-align: center;
               pointer-events: none; }
.gallery-heading-en { font-family: var(--font-label); font-weight: 700; font-size: 22px;
                      letter-spacing: 5px; text-shadow: 0 2px 14px rgba(0,0,0,.6); }
.gallery-sub { font-family: var(--font-serif-tc); font-size: 12.5px; letter-spacing: 1px;
               color: rgba(255,255,255,.8); margin-top: 8px; text-shadow: 0 2px 10px rgba(0,0,0,.6); }
.gallery-dots { position: absolute; left: 0; right: 0; z-index: 3;
                bottom: calc(78px + env(safe-area-inset-bottom));
                display: flex; justify-content: center; gap: 7px; margin: 0; }
.gallery-dot { width: 6px; height: 6px; border-radius: 50%;
               background: rgba(255,255,255,.35); transition: background .25s ease, transform .25s ease; }
.gallery-dot.active { background: #fff; transform: scale(1.35); }

/* =====================================================================
 * FLOATING ISLAND BOTTOM NAV（DESIGN LOCK：浮動島狀 pill）
 * =================================================================== */
#nav-wrap { position: absolute; left: 0; right: 0;
            bottom: calc(8px + env(safe-area-inset-bottom)); /* 貼近螢幕最下緣（避開 home indicator） */
            z-index: 70; display: flex; justify-content: center; pointer-events: none; }
#nav { position: relative; display: flex; padding: 6px; border-radius: 30px;
       background: rgba(18,18,22,.16);
       backdrop-filter: blur(44px) saturate(1.7);
       -webkit-backdrop-filter: blur(44px) saturate(1.7); /* iPhone 必要 */
       border: 1px solid rgba(255,255,255,.1);
       box-shadow: 0 16px 42px rgba(0,0,0,.44), 0 2px 8px rgba(0,0,0,.26),
                   inset 0 1px 0 rgba(255,255,255,.32), inset 0 -8px 16px rgba(255,255,255,.05);
       pointer-events: auto; }
#nav::before { content: ""; position: absolute; inset: 0; border-radius: 30px;
               background: linear-gradient(135deg, rgba(255,255,255,.16), transparent 42%);
               pointer-events: none; }
#nav-ind { position: absolute; top: 6px; left: 6px; width: 64px;
           height: calc(100% - 12px); border-radius: 21px;
           transform: translateX(0);
           transition: transform .46s cubic-bezier(.34,1.32,.42,1);
           background: linear-gradient(180deg, rgba(255,255,255,.26), rgba(var(--primary-rgb), .12));
           box-shadow: inset 0 1px 0 rgba(255,255,255,.45),
                       inset 0 0 12px rgba(var(--primary-rgb), .18),
                       inset 0 -6px 12px rgba(255,255,255,.06), 0 4px 12px rgba(0,0,0,.16);
           backdrop-filter: blur(6px);
           -webkit-backdrop-filter: blur(6px);
           pointer-events: none; }
.navbtn { position: relative; z-index: 1; width: 64px; padding: 7px 0 6px;
          border: none; background: none; cursor: pointer;
          display: flex; flex-direction: column; align-items: center; gap: 3px;
          font-family: var(--font-serif-tc); font-size: 9px; letter-spacing: 1.2px;
          color: #8f8a9c; transition: color .3s ease, transform .18s ease; }
.navbtn:active { transform: scale(.92); }
.navbtn .navico { display: flex; transition: filter .35s ease; }
.navbtn .navlbl { opacity: .62; transition: opacity .3s ease; }
.navbtn.active { color: #fbd6e6; }
.navbtn.active .navico { filter: drop-shadow(0 0 7px rgba(var(--primary-rgb), .6)); }
.navbtn.active .navlbl { opacity: 1; }
.navbtn.pop .navico { animation: tabPop .26s cubic-bezier(.34,1.3,.4,1); }

/* =====================================================================
 * TOAST / 動畫特效
 * =================================================================== */
#toast { position: absolute; left: 50%; bottom: calc(96px + env(safe-area-inset-bottom));
         z-index: 100; transform: translateX(-50%);
         background: rgba(20,15,26,.96); border: 1px solid rgba(var(--primary-rgb), .4);
         color: #fff; padding: 10px 20px; border-radius: 22px; font-size: 12.5px;
         font-family: var(--font-serif-tc); white-space: nowrap; max-width: 84%;
         overflow: hidden; text-overflow: ellipsis; text-align: center;
         box-shadow: 0 8px 24px rgba(0,0,0,.5);
         opacity: 0; pointer-events: none; transition: opacity .25s ease; }
#toast.show { opacity: 1; }

#fx-layer { position: absolute; inset: 0; z-index: 80; pointer-events: none; overflow: hidden; }
.fx-heart { position: absolute; }
.fx-glow { position: absolute; width: 150px; height: 150px; border-radius: 50%;
           background: radial-gradient(circle, rgba(var(--primary-rgb), .55),
                       rgba(var(--primary-rgb), .22) 55%, transparent 72%);
           transform: translate(-50%, -50%); animation: glowFade 1.1s ease-out both; }
.fx-ring { position: absolute; width: 64px; height: 64px; border-radius: 50%;
           border: 1.5px solid rgba(var(--primary-rgb), .8);
           transform: translate(-50%, -50%);
           animation: ringPulse .9s cubic-bezier(.2,.7,.3,1) both; }
.fx-bloom { position: absolute; transform: translate(-50%, -50%);
            filter: drop-shadow(0 4px 14px rgba(var(--primary-rgb), .6));
            animation: bloomHeart 1s cubic-bezier(.3,1.3,.5,1) both; }
#unlock-fx { position: absolute; inset: 0; z-index: 90; pointer-events: none;
             background: radial-gradient(60% 50% at 50% 45%,
                         rgba(var(--primary-rgb), .55), rgba(var(--primary-rgb), .3) 45%,
                         transparent 72%);
             animation: burstGlow 1.8s ease-out forwards; }
#unlock-fx .fx-ring2 { position: absolute; left: 50%; top: 42%;
                       transform: translate(-50%, -50%); width: 120px; height: 120px;
                       border-radius: 50%; border: 2px solid rgba(var(--primary-rgb), .7);
                       animation: ring 1.4s ease-out forwards; }
.fx-float { position: absolute; bottom: 35%; animation: floatUp 1.2s ease-out both; }

.hidden { display: none !important; }

/* ---- keyframes ------------------------------------------------------ */
@keyframes breathe   { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
@keyframes reveal    { 0% { opacity: 0; transform: translateY(12px); } 100% { opacity: 1; transform: none; } }
@keyframes fadeIn    { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp   { from { transform: translateY(100%); } to { transform: none; } }
@keyframes bounce    { 0% { transform: scale(1); } 30% { transform: scale(1.2); } 55% { transform: scale(.95); } 100% { transform: scale(1); } }
@keyframes tabPop    { 0% { transform: scale(1); } 32% { transform: scale(.9); } 66% { transform: scale(1.07); } 100% { transform: scale(1); } }
@keyframes dotPulse  { 0%,100% { opacity: .3; transform: translate(-50%,-50%) scale(.8); } 50% { opacity: .78; transform: translate(-50%,-50%) scale(1.25); } }
@keyframes ring      { 0% { transform: translate(-50%,-50%) scale(.6); opacity: .7; } 100% { transform: translate(-50%,-50%) scale(2.4); opacity: 0; } }
@keyframes ringPulse { 0% { opacity: .7; transform: translate(-50%,-50%) scale(.35); } 100% { opacity: 0; transform: translate(-50%,-50%) scale(2.8); } }
@keyframes glowFade  { 0% { opacity: 0; transform: translate(-50%,-50%) scale(.5); } 28% { opacity: 1; transform: translate(-50%,-50%) scale(1); } 100% { opacity: 0; transform: translate(-50%,-50%) scale(1.6); } }
@keyframes bloomHeart{ 0% { opacity: 0; transform: translate(-50%,-50%) scale(.25); } 32% { opacity: 1; transform: translate(-50%,-50%) scale(1.18); } 48% { transform: translate(-50%,-50%) scale(1); } 100% { opacity: 0; transform: translate(-50%,-50%) scale(.9) translateY(-30px); } }
@keyframes burstGlow { 0% { opacity: 0; } 25% { opacity: 1; } 100% { opacity: 0; } }
@keyframes floatUp   { 0% { opacity: 0; transform: translateY(0) scale(.5); } 12% { opacity: 1; } 100% { opacity: 0; transform: translateY(-220px) scale(1.15); } }
@keyframes floatHeart{ 0% { opacity: 0; transform: translate(-50%,-50%) scale(.2) rotate(0); }
                       18% { opacity: .95; transform: translate(-50%,-50%) scale(var(--s)) rotate(0); }
                       100% { opacity: 0; transform: translate(calc(-50% + var(--dx)), calc(-50% - var(--rise))) scale(var(--s)) rotate(var(--r2)); } }
@keyframes heartbeat { 0%,100% { transform: scale(1); } 30% { transform: scale(1.22); } 55% { transform: scale(1); } }

</style>
</head>
<body>
<template id="__bundler_thumbnail"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="#07111F"/><text x="50" y="46" font-family="Georgia,serif" font-style="italic" font-size="15" fill="#DDEBFF" text-anchor="middle">THE</text><text x="50" y="64" font-family="Georgia,serif" font-style="italic" font-size="15" fill="#DDEBFF" text-anchor="middle">SKY</text></svg></template>
<div id="stage">

  <!-- ================= PLAYER（聽歌）================= -->
  <section id="screen-player" class="screen active">
    <div class="player-fold">

      <!-- 封面（換圖：album-config.js → coverImage） -->
      <div class="cover-card" id="cover-card">
        <img id="cover-img" src="" alt="">
        <video id="cover-video" autoplay muted loop playsinline webkit-playsinline></video>
        <div class="cover-shade"></div>
        <div class="cover-titles">
          <div class="cover-eyebrow" id="cover-eyebrow"></div>
          <div class="cover-title-en" id="cover-title-en"></div>
        </div>
      </div>

      <!-- Now Playing 毛玻璃卡片 -->
      <div class="np-card">
        <div class="np-head">
          <div style="flex:1;min-width:0">
            <div class="np-label" id="np-label"></div>
            <div class="np-title" id="np-title">—</div>
            <div class="np-sub" id="np-sub"></div>
          </div>
          <div class="np-actions">
            <!-- 歌詞按鈕（這首歌沒歌詞時 app.js 會自動隱藏） -->
            <button class="btn-lyrics-text" id="btn-lyrics" title="歌詞">Lyrics</button>
            <!-- 心動收藏 -->
            <button class="icon-round" id="btn-heart" title="收藏這一刻">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M12 21s-7.5-4.6-10-9.3C.3 8.3 1.9 4.8 5.2 4.8c2 0 3.3 1.2 3.9 2.2.6-1 1.9-2.2 3.9-2.2 3.3 0 4.9 3.5 3.2 6.9C19.5 16.4 12 21 12 21z"/></svg>
            </button>
          </div>
        </div>

        <!-- 進度條（可點、可拖曳） -->
        <div class="prog" id="prog">
          <div class="prog-fill" id="prog-fill"></div>
          <div class="prog-glow" id="prog-glow"></div>
          <div class="prog-dot" id="prog-dot"></div>
        </div>
        <div class="np-times"><span id="t-cur">0:00</span><span id="t-dur">0:00</span></div>

        <!-- 控制鍵 -->
        <div class="np-controls">
          <button class="btn-ghost" id="btn-prev" title="上一首">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
          </button>
          <button class="btn-play" id="btn-play" title="播放 / 暫停">
            <svg width="23" height="23" viewBox="0 0 24 24"><path id="play-icon-path" d="M8 5v14l11-7z"/></svg>
          </button>
          <button class="btn-ghost" id="btn-next" title="下一首">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
          </button>
        </div>

        <!-- Next Scene → 打開 Bottom Sheet 曲目表 -->
        <div class="np-next" id="btn-open-sheet">
          <span id="next-scene-label"></span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.45)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>
    </div>
  </section>

  <!-- ================= 完整版（購買 + 兌換解鎖，合併成一頁）================= -->
  <section id="screen-purchase" class="screen screen-sub">
    <div class="page-titles">
      <div class="page-title-en" id="purchase-title-en"></div>
      <div class="page-title-tc" id="purchase-title-tc"></div>
      <div class="page-note" id="purchase-note"></div>
    </div>

    <!-- 購買方案（未解鎖才顯示） -->
    <div id="buy-block">
      <div class="plans" id="plans"></div>
      <div class="cta-block">
        <button class="btn-primary" id="btn-checkout"></button>
      </div>
    </div>

    <!-- 已經購買 → 輸入兌換碼解鎖（未解鎖才顯示） -->
    <div id="unlock-form-view">
      <div class="redeem-divider"><span>已經購買了？</span></div>
      <div class="form-block">
        <label class="form-label" for="in-email">EMAIL</label>
        <input class="form-input" id="in-email" type="email" placeholder="you@example.com" autocomplete="email">
        <label class="form-label" for="in-code">兌換碼 · CODE</label>
        <input class="form-input" id="in-code" type="text" placeholder="" autocomplete="off" style="margin-bottom:20px">
        <button class="btn-primary" id="btn-redeem">輸入兌換碼解鎖</button>
        <div class="page-note" style="text-align:center;padding:14px 10px 0">購買後兌換碼會寄到信箱，請用「購買時的 email」解鎖</div>
      </div>
    </div>

    <!-- 已解鎖 -->
    <div id="unlock-done-view" class="hidden">
      <div class="unlocked-card">
        <div class="unlocked-check">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div class="unlocked-eyebrow">FULL ALBUM UNLOCKED</div>
        <div class="unlocked-title" id="unlocked-title"></div>
        <div class="page-note" id="unlocked-desc" style="margin-top:8px"></div>
        <div class="unlocked-actions">
          <button class="btn-chip" id="btn-goto-player">前往聽歌 →</button>
          <a class="btn-chip grad hidden" id="btn-wav" target="_blank" rel="noopener">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            下載 WAV 無損 ↗
          </a>
        </div>
        <div class="unlocked-note" id="unlocked-plan-note"></div>
        <div class="unlocked-reset" id="btn-reset-unlock">重設解鎖（測試用）</div>
      </div>
    </div>
  </section>

  <!-- ================= MOOD WALL（心情牆）================= -->
  <section id="screen-mood" class="screen screen-sub">
    <div class="page-titles">
      <div style="font-family:var(--font-label);font-weight:700;font-size:23px;letter-spacing:3px" id="mood-heading"></div>
      <div class="page-title-tc" id="mood-subheading" style="font-size:13px;color:rgba(255,255,255,.65);margin-top:12px;letter-spacing:1px;line-height:1.7"></div>
      <div style="font-family:var(--font-label);font-size:10px;letter-spacing:3px;color:var(--primary);margin-top:7px;text-transform:uppercase" id="mood-eyebrow"></div>
    </div>
    <div class="mood-count">今晚有 <b id="mood-count">0</b> 個人，把秘密留在這裡。</div>
    <div class="mood-form">
      <input class="form-input" id="mood-name" type="text" placeholder="你的暱稱" maxlength="16" autocomplete="off">
      <div class="mood-tags" id="mood-tags"></div>
      <textarea class="mood-textarea" id="mood-text" maxlength="80" placeholder="現在聽這首歌，你想留下什麼心情？"></textarea>
      <div class="mood-chars"><span id="mood-chars">0</span> / 80</div>
      <div class="mood-err hidden" id="mood-err">先寫下一點心情吧。</div>
      <button class="btn-primary mood-submit" id="btn-mood-submit">留下心情</button>
    </div>
    <div class="mood-notes" id="mood-notes"></div>
  </section>

  <!-- ================= GALLERY（寫真牆，滑動相簿）================= -->
  <section id="screen-gallery" class="screen">
    <div class="gallery-scroll" id="gallery-scroll"></div>
    <div class="gallery-top">
      <div class="gallery-heading-en" id="gallery-heading">GALLERY</div>
      <div class="gallery-sub" id="gallery-subheading"></div>
    </div>
    <div class="gallery-dots" id="gallery-dots"></div>
  </section>

  <!-- ================= BOTTOM SHEET（曲目表，可拖曳關閉）================= -->
  <div id="sheet-backdrop" class="hidden"></div>
  <div id="sheet" class="hidden">
    <div class="sheet-grabber" id="sheet-grabber"></div>
    <div class="sheet-head">
      <div>
        <div class="sheet-eyebrow">Track List</div>
        <div class="sheet-title" id="sheet-title"></div>
      </div>
      <button class="sheet-close" id="btn-close-sheet">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
      </button>
    </div>
    <div class="sheet-list" id="sheet-list"></div>
  </div>

  <!-- ================= LYRICS OVERLAY ================= -->
  <div id="lyrics-overlay" class="hidden">
    <div class="lyrics-head">
      <div>
        <div class="sheet-eyebrow" id="lyrics-eyebrow">Lyrics</div>
        <div class="sheet-title" id="lyrics-title"></div>
      </div>
      <button class="sheet-close" id="btn-close-lyrics">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
      </button>
    </div>
    <div class="lyrics-body" id="lyrics-body"></div>
  </div>

  <!-- ================= FLOATING ISLAND NAV ================= -->
  <nav id="nav-wrap">
    <div id="nav">
      <div id="nav-ind"></div>
      <button class="navbtn active" data-screen="player">
        <span class="navico"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></span>
        <span class="navlbl"></span>

    return (p === "599" || p === "deluxe" || priceIsDeluxe) ? "deluxe" : "basic";

  function isLocked(t) { return !t.free && !state.unlocked; }

  /* ---------- 音源路徑 ----------
   * 免費曲：本地檔（assets/audio/，可公開部署在 GitHub Pages）。
   * 付費曲：一律走 Worker /track 驗證後串流 —— 真實音檔在私有 R2，
   *         「絕對不要」把付費音檔放進前端 repo。
   * ⚠️ PITFALLS #3：file 參數用 protectedPath（含 "os3/" 之類前綴），
   *    必須與 worker.js 的 PROTECTED_FILES、R2 object key 完全一致。 */
  function srcFor(t) {
    if (t.free) return t.audioPath;
    var u = unlockInfo();
    return CFG.api.workerBaseUrl + "/track?file=" + encodeURIComponent(t.protectedPath || "") +
      "&email=" + encodeURIComponent(u.email || "") + "&code=" + encodeURIComponent(u.code || "");
  }

  /* ---------- Audio 引擎 ---------- */
  var audio = new Audio();
  audio.preload = "none";

  audio.addEventListener("timeupdate", function () {
    if (seeking) return;
    var d = audio.duration;
    if (isFinite(d) && d > 0) state.dur = d;
    renderProgress(audio.currentTime);
    if (Date.now() - saveT > 4000) { saveT = Date.now(); lsSet(LS.pos, { cur: state.cur, time: audio.currentTime }); }
  });
  /* 串流檔常回報 duration:Infinity → 逼瀏覽器解析真實長度 */
  function resolveDur() {
    var d = audio.duration;
    if (isFinite(d) && d > 0) { state.dur = d; renderProgress(audio.currentTime); return; }
    if (durFixing) return; durFixing = true;
    resumeAt = audio.currentTime || 0;
    var onSeek = function () {
      audio.removeEventListener("timeupdate", onSeek);
      var real = audio.duration;
      if (isFinite(real) && real > 0) state.dur = real;
      try { audio.currentTime = resumeAt || 0; } catch (e) {}
      resumeAt = 0; durFixing = false;
    };
    audio.addEventListener("timeupdate", onSeek);
    try { audio.currentTime = 1e7; } catch (e) { durFixing = false; }
  }
  audio.addEventListener("loadedmetadata", resolveDur);
  audio.addEventListener("durationchange", function () {
    var d = audio.duration; if (isFinite(d) && d > 0) { state.dur = d; renderProgress(audio.currentTime); }
  });
  audio.addEventListener("play", function () { state.playing = true; renderPlayState(); });
  audio.addEventListener("pause", function () { state.playing = false; renderPlayState(); });
  audio.addEventListener("ended", function () { next(); });

  function playTrack(i) {
    var t = TRACKS[i];
    if (isLocked(t)) { toast("需解鎖完整專輯才能播放"); go("purchase"); return; }
    durFixing = false; resumeAt = 0;
    state.cur = i; state.dur = 0;
    audio.src = srcFor(t);
    audio.play().catch(function () {});   // 同一手勢 tick 內呼叫（iOS 必要）
    renderNowPlaying(); renderTrackLists(); renderProgress(0);
    updateMediaSession();
  }
  function togglePlay() {
    if (!audio.src) { playTrack(state.cur); return; }
    if (audio.paused) audio.play().catch(function () {}); else audio.pause();
  }
  function next() {
    var i = state.cur;
    do { i = (i + 1) % TOTAL; } while (isLocked(TRACKS[i]) && i !== state.cur);
    if (isLocked(TRACKS[i])) { toast("其餘曲目需解鎖完整專輯"); return; }
    playTrack(i);
  }
  function prev() {
    if (audio.currentTime > 3) { audio.currentTime = 0; return; }
    var i = state.cur;
    do { i = (i - 1 + TOTAL) % TOTAL; } while (isLocked(TRACKS[i]) && i !== state.cur);
    if (isLocked(TRACKS[i])) return;
    playTrack(i);
  }

  /* ---------- Media Session（鎖定畫面 + 耳機控制）---------- */
  function updateMediaSession() {
    if (!("mediaSession" in navigator)) return;
    var t = TRACKS[state.cur];
    var art = t.artwork || CFG.coverImage;
    try {
      navigator.mediaSession.metadata = new MediaMetadata({
        title: isLocked(t) ? "Secret Track" : t.title,
        artist: CFG.artistName || "",
        album: CFG.albumTitle || "",
        artwork: art ? [{ src: art, sizes: "512x512", type: "image/png" }] : [],
      });
      navigator.mediaSession.setActionHandler("play", function () { audio.play().catch(function () {}); });
      navigator.mediaSession.setActionHandler("pause", function () { audio.pause(); });
      navigator.mediaSession.setActionHandler("previoustrack", prev);
      navigator.mediaSession.setActionHandler("nexttrack", next);
      navigator.mediaSession.setActionHandler("seekto", function (d) {
        if (d.seekTime != null) { try { audio.currentTime = d.seekTime; } catch (e) {} }
      });
    } catch (e) {}
  }

  /* ---------- 進度條（點擊 + 拖曳）---------- */
  var progEl = $("prog");
  function renderProgress(cur) {
    var pct = state.dur ? Math.max(0, Math.min(100, (cur / state.dur) * 100)) : 0;
    $("prog-fill").style.width = pct + "%";
    /* BUG FIX：帶角色標籤的圓點寬 26px，0%/100% 時 clamp 住不凸出進度條外 */
    $("prog-dot").style.left = "clamp(13px, " + pct + "%, calc(100% - 13px))";
    $("prog-glow").style.left = "clamp(13px, " + pct + "%, calc(100% - 13px))";
    $("t-cur").textContent = fmt(cur);
    $("t-dur").textContent = fmt(state.dur);
  }
  function seekAt(e) {
    var r = progEl.getBoundingClientRect();
    var p = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
    var ad = audio.duration;
    var dur = (isFinite(ad) && ad > 0) ? ad : (state.dur || 0);
    if (dur > 0) { try { audio.currentTime = p * dur; } catch (err) {} }
    renderProgress(p * dur);
  }
  progEl.addEventListener("pointerdown", function (e) {
    seeking = true; seekAt(e);
    var move = function (ev) { seekAt(ev); };
    var up = function () { seeking = false; document.removeEventListener("pointermove", move); document.removeEventListener("pointerup", up); };
    document.addEventListener("pointermove", move);
    document.addEventListener("pointerup", up);
  });

  /* ---------- Now Playing 卡片 ---------- */
  function renderNowPlaying() {
    var t = TRACKS[state.cur];
    var locked = isLocked(t);
    $("np-title").textContent = locked ? "Secret Track" : t.title;
    $("np-sub").textContent = "track " + pad2(t.n) + (t.subtitle ? " · " + t.subtitle : "");
    /* 進度圓點：config 有 progressDot 就交替顯示角色標籤 */
    var pd = (CFG.theme || {}).progressDot;
    var dot = $("prog-dot");
    if (pd && pd.labels && pd.labels.length) {
      var idx = (t.n % 2 === 1) ? 0 : 1;
      dot.textContent = pd.labels[idx % pd.labels.length];
      if (pd.gradients && pd.gradients[idx]) {
        dot.style.background = pd.gradients[idx];
        $("prog-fill").style.background = pd.gradients[idx];
      }
    } else { dot.textContent = ""; }
    /* 歌詞按鈕：沒歌詞就藏起來（頁面不會壞） */
    $("btn-lyrics").classList.toggle("hidden", !t.lyricsPath);
  }
  function renderPlayState() {
    $("play-icon-path").setAttribute("d", state.playing ? "M6 5h4v14H6zM14 5h4v14h-4z" : "M8 5v14l11-7z");
    $("cover-card").classList.toggle("playing", state.playing);   // 封面呼吸動畫
    $("prog-glow").classList.toggle("pulsing", state.playing);
    if ("mediaSession" in navigator) { try { navigator.mediaSession.playbackState = state.playing ? "playing" : "paused"; } catch (e) {} }
  }

  /* ---------- 曲目列表（主頁 + Bottom Sheet 共用同一份渲染）---------- */
  function trackRowHTML(t, i, revealing) {
    var locked = isLocked(t);
    var isCur = i === state.cur;
    var cls = "track-row" + (isCur ? " current" : "") + (locked ? " locked" : "") + (revealing && !t.free ? " revealing" : "");
    var style = revealing && !t.free ? ' style="animation-delay:' + ((i - freeCount) * 0.05).toFixed(2) + 's"' : "";
    var right;
    if (locked) {
      right = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6f6680" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>';
    } else if (state.unlocked && purchasedProduct() === "deluxe" && !t.free) {
      right = '<button class="track-dl" data-dl="' + i + '" title="下載這首"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>';
    } else {
      right = '<svg width="14" height="14" viewBox="0 0 24 24" fill="var(--primary)"><path d="M8 5v14l11-7z"/></svg>';
    }
    return '<div class="' + cls + '" data-i="' + i + '"' + style + '>' +
      '<span class="track-num">' + pad2(t.n) + "</span>" +
      '<div class="track-name">' + (locked ? "Secret Track" : esc(t.title)) + "</div>" + right + "</div>";
  }
  function renderTrackLists(revealing) {
    var html = TRACKS.map(function (t, i) { return trackRowHTML(t, i, revealing); }).join("");
    var tl = $("tracklist"); if (tl) tl.innerHTML = html;
    $("sheet-list").innerHTML = html;
  }
  function bindTrackListClicks(container) {
    container.addEventListener("click", function (e) {
      var dl = e.target.closest("[data-dl]");
      if (dl) { e.stopPropagation(); downloadTrack(parseInt(dl.getAttribute("data-dl"), 10)); return; }
      var row = e.target.closest(".track-row");
      if (row) playTrack(parseInt(row.getAttribute("data-i"), 10));
    });
  }
  bindTrackListClicks($("sheet-list"));

  /* 單曲下載：典藏版限定（Worker 端同樣會驗證，前端只是 UI 把關） */
  function downloadTrack(i) {
    var t = TRACKS[i];
    if (isLocked(t)) { toast("需解鎖完整專輯才能下載"); go("purchase"); return; }
    if (!t.free && purchasedProduct() !== "deluxe") { toast("下載為典藏版限定"); return; }
    var url = srcFor(t) + (t.free ? "" : "&download=1");
    try {
      var a = document.createElement("a");
      /* BUG FIX：副檔名跟著實際檔案走（05/08 是 .wav，不能寫死 .mp3） */
      var ext = ((t.protectedPath || t.audioPath || "").match(/\.(\w+)$/) || [0, "mp3"])[1];
      a.href = url; a.download = pad2(t.n) + " " + t.title + "." + ext; a.rel = "noopener";
      document.body.appendChild(a); a.click(); a.remove();
    } catch (e) { window.open(url, "_blank"); }
    hap(10); toast("開始下載 · " + t.title);
  }

  /* ---------- Bottom Sheet（含 iOS 風格拖曳關閉）---------- */
  var sheet = $("sheet"), backdrop = $("sheet-backdrop");
  function openSheet() { sheet.classList.remove("hidden"); backdrop.classList.remove("hidden"); sheet.style.transform = ""; }
  function closeSheet() { sheet.classList.add("hidden"); backdrop.classList.add("hidden"); sheet.classList.remove("dragging", "snapping"); sheet.style.transform = ""; }
  $("btn-open-sheet").addEventListener("click", openSheet);
  $("btn-close-sheet").addEventListener("click", closeSheet);
  backdrop.addEventListener("click", closeSheet);
  /* 拖把手往下拉：跟手移動，放開超過 1/4 高度或速度夠快 → 關閉 */
  (function () {
    var startY = 0, curY = 0, startT = 0, active = false;
    function onStart(e) {
      active = true; startY = curY = (e.touches ? e.touches[0].clientY : e.clientY); startT = Date.now();
      sheet.classList.add("dragging"); sheet.classList.remove("snapping");
    }
    function onMove(e) {
      if (!active) return;
      curY = (e.touches ? e.touches[0].clientY : e.clientY);
      var dy = Math.max(0, curY - startY);
      sheet.style.transform = "translateY(" + dy + "px)";
      if (e.cancelable) e.preventDefault();
    }
    function onEnd() {
      if (!active) return; active = false;
      sheet.classList.remove("dragging");
      var dy = Math.max(0, curY - startY);
      var v = dy / Math.max(1, Date.now() - startT); // px/ms
      if (dy > sheet.offsetHeight / 4 || v > 0.6) { closeSheet(); }
      else { sheet.classList.add("snapping"); sheet.style.transform = "translateY(0)"; }
    }
    var g = $("sheet-grabber"), h = sheet.querySelector(".sheet-head");
    [g, h].forEach(function (el) {
      el.addEventListener("touchstart", onStart, { passive: true });
      el.addEventListener("mousedown", onStart);
    });
    document.addEventListener("touchmove", onMove, { passive: false });
    document.addEventListener("mousemove", onMove);
    document.addEventListener("touchend", onEnd);
    document.addEventListener("mouseup", onEnd);
  })();

  /* ---------- 歌詞 ---------- */
  $("btn-lyrics").addEventListener("click", function () {
    var t = TRACKS[state.cur];
    $("lyrics-eyebrow").textContent = STR.lyricsLabel || "Lyrics";
    $("lyrics-title").textContent = isLocked(t) ? "Secret Track" : t.title;
    var body = $("lyrics-body");
    $("lyrics-overlay").classList.remove("hidden");
    if (!t.lyricsPath) { body.innerHTML = '<div class="lyrics-empty">' + esc(STR.noLyrics || "這首歌暫時沒有歌詞") + "</div>"; return; }
    if (lyricsCache[t.n] != null) { body.textContent = lyricsCache[t.n]; return; }
    body.innerHTML = '<div class="lyrics-empty">載入中…</div>';
    fetch(t.lyricsPath).then(function (r) {
      if (!r.ok) throw new Error(r.status);
      return r.text();
    }).then(function (txt) {
      lyricsCache[t.n] = txt;
      body.textContent = txt;
      /* 之後要做同步歌詞（LRC）可在這裡解析時間標記 */
    }).catch(function () {
      body.innerHTML = '<div class="lyrics-empty">' + esc(STR.noLyrics || "這首歌暫時沒有歌詞") + "</div>";
    });
  });
  $("btn-close-lyrics").addEventListener("click", function () { $("lyrics-overlay").classList.add("hidden"); });

  /* ---------- 分頁切換 + Floating Island Nav ---------- */
  var navBtns = Array.prototype.slice.call(document.querySelectorAll("#nav .navbtn"));
  var ORDER = ["player", "purchase", "mood", "gallery"];
  function go(screen) {
    state.screen = screen;
    closeSheet();
    ORDER.forEach(function (s) {
      $("screen-" + s).classList.toggle("active", s === screen);
    });
    var i = ORDER.indexOf(screen);
    $("nav-ind").style.transform = "translateX(" + (i * 64) + "px)";
    navBtns.forEach(function (b, j) {
      b.classList.toggle("active", j === i);
      b.classList.remove("pop");

    if (i >= 0) { void navBtns[i].offsetWidth; navBtns[i].classList.add("pop"); }
    if (screen === "purchase") renderUnlockView();
  }
  navBtns.forEach(function (b) { b.addEventListener("click", function () { go(b.getAttribute("data-screen")); }); });

  /* ---------- 付費解鎖頁 ---------- */
  function renderPlans() {
    var P = CFG.payment || {};
    var plans = [
      { key: "basic", name: P.basicName, price: P.basicPrice, features: P.basicFeatures || [], deluxe: false },
      { key: "deluxe", name: P.deluxeName, price: P.deluxePrice, features: P.deluxeFeatures || [], deluxe: true },
    ];
    /* BUG FIX：尚未開典藏版（兩方案同名同價同連結）時只顯示一張方案卡 */
    if (P.deluxeName === P.basicName && P.deluxePrice === P.basicPrice &&

    }
    $("plans").innerHTML = plans.map(function (p) {
      var check = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
      return '<div class="plan' + (p.deluxe ? " deluxe" : "") + (state.selectedPlan === p.key ? " selected" : "") + '" data-plan="' + p.key + '">' +
        (p.deluxe && P.deluxeBadge ? '<div class="plan-badge">' + esc(P.deluxeBadge) + "</div>" : "") +
        '<div class="plan-name">' + esc(p.name) + "</div>" +

        '<div class="plan-features">' + p.features.map(function (f) {

  /* Stripe Payment Link 在 album-config.js → payment 換 */

  $("btn-goto-player").addEventListener("click", function () { go("player"); });

  /* ---------- 兌換 / 解鎖 ---------- */
  function renderUnlockView() {

  $("btn-redeem").addEventListener("click", function () {

  $("btn-mood-submit").addEventListener("click", function () {

    var name = ($("mood-name").value || "").trim() || "匿名聽眾";
    var c = { id: Date.now(), name: name, mood: selectedMood || "聽歌中", text: text.slice(0, 80), time: "剛剛" };
    moods.unshift(c);
    lsSet(LS.mood, moods);           // localStorage key 依專輯 namespace，不會跟其他專輯混
    newMoodId = c.id; selectedMood = "";
    $("mood-name").value = ""; $("mood-text").value = ""; $("mood-chars").textContent = "0";
    hap(15); renderMoodWall();
    var btn = $("btn-mood-submit");
    btn.textContent = "已收藏這個瞬間 ♡";
    setTimeout(function () { btn.textContent = "留下心情"; }, 1100);
  });

  /* ---------- Toast ---------- */
  var toastT = null;
  function toast(msg, dur) {
    var el = $("toast");
    el.textContent = msg;
    el.classList.add("show");
    clearTimeout(toastT);
    toastT = setTimeout(function () { el.classList.remove("show"); }, dur || 2200);
  }

  /* ---------- 特效：心動收藏 / 解鎖慶祝 ---------- */
  var HEART_PATH = "M12 21s-7.5-4.6-10-9.3C.3 8.3 1.9 4.8 5.2 4.8c2 0 3.3 1.2 3.9 2.2.6-1 1.9-2.2 3.9-2.2 3.3 0 4.9 3.5 3.2 6.9C19.5 16.4 12 21 12 21z";
  function heartSVG(size, color, style) {
    return '<svg class="fx-heart" width="' + size + '" height="' + size + '" viewBox="0 0 24 24" fill="' + color + '" style="' + style + '"><path d="' + HEART_PATH + '"/></svg>';
  }
  $("btn-heart").addEventListener("click", function (e) {
    var t = TRACKS[state.cur];
    if (isLocked(t)) { toast("解鎖後才能收藏這首的心動瞬間"); return; }
    var stage = $("stage").getBoundingClientRect();
    var b = e.currentTarget.getBoundingClientRect();
    var ox = ((b.left + b.width / 2 - stage.left) / stage.width * 100).toFixed(1);
    var oy = ((b.top + b.height / 2 - stage.top) / stage.height * 100).toFixed(1);
    var fx = $("fx-layer");
    var cols = [getComputedStyle(document.documentElement).getPropertyValue("--primary").trim() || "#f29bc2",
                getComputedStyle(document.documentElement).getPropertyValue("--secondary").trim() || "#c9b0ec",
                getComputedStyle(document.documentElement).getPropertyValue("--accent").trim() || "#afc7f6"];
    var html = '<div class="fx-glow" style="left:' + ox + "%;top:" + oy + '%"></div>' +
               '<div class="fx-ring" style="left:' + ox + "%;top:" + oy + '%"></div>' +
               '<svg class="fx-bloom" width="60" height="60" viewBox="0 0 24 24" fill="' + cols[0] + '" style="left:' + ox + "%;top:" + oy + '%"><path d="' + HEART_PATH + '"/></svg>';
    for (var k = 0; k < 16; k++) {
      var dx = ((Math.random() * 2 - 1) * 72).toFixed(0);
      var rise = (120 + Math.random() * 150).toFixed(0);
      var sc = (0.65 + Math.random() * 0.85).toFixed(2);
      var r2 = ((Math.random() * 2 - 1) * 45).toFixed(0);
      var dur = (1.1 + Math.random() * 0.9).toFixed(2);
      var delay = (Math.random() * 0.4).toFixed(2);
      var size = (13 + Math.random() * 15).toFixed(0);
      var col = cols[Math.floor(Math.random() * cols.length)];
      html += heartSVG(size, col,
        "left:" + ox + "%;top:" + oy + "%;transform:translate(-50%,-50%);--dx:" + dx + "px;--rise:" + rise + "px;--s:" + sc + ";--r2:" + r2 + "deg;" +
        "animation:floatHeart " + dur + "s cubic-bezier(.4,.7,.5,1) " + delay + "s both");
    }
    fx.innerHTML = html;
    var hearts = (lsGet(LS.hearts, 0) || 0) + 1;
    lsSet(LS.hearts, hearts);
    var btn = $("btn-heart");
    btn.classList.add("liked");
    setTimeout(function () { btn.classList.remove("liked"); }, 1200);
    hap([8, 40, 12]); toast("已收藏這一刻", 1000);
    setTimeout(function () { fx.innerHTML = ""; }, 2600);
  });
  function unlockBurstFx() {
    var fx = $("fx-layer");
    var html = '<div id="unlock-fx"><div class="fx-ring2"></div></div>';
    for (var k = 0; k < 8; k++) {
      var left = (10 + Math.random() * 78).toFixed(0);
      var size = (13 + Math.random() * 13).toFixed(0);
      var dur = (0.95 + Math.random() * 0.45).toFixed(2);
      var delay = (Math.random() * 0.3).toFixed(2);
      html += '<svg class="fx-float" width="' + size + '" height="' + size + '" viewBox="0 0 24 24" fill="var(--primary)" style="left:' + left + "%;animation-duration:" + dur + "s;animation-delay:" + delay + 's"><path d="' + HEART_PATH + '"/></svg>';
    }
    fx.innerHTML = html;
    setTimeout(function () { fx.innerHTML = ""; }, 2200);
  }

  /* ---------- 控制鍵綁定 ---------- */
  $("btn-play").addEventListener("click", togglePlay);
  $("btn-prev").addEventListener("click", prev);
  $("btn-next").addEventListener("click", next);

  /* ---------- 開機 ---------- */
  renderNowPlaying();
  renderPlayState();
  renderTrackLists();
  renderPlans();
  renderUnlockView();
  renderMoodWall();
  renderProgress(pos.time || 0);
})();

</script>

</body>
